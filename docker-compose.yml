version: '3.9'

services:
  # ==========================================
  # DATABASE - PostgreSQL 12
  # ==========================================
  postgres:
    image: postgres:12-alpine
    container_name: tms-japfa-db
    environment:
      POSTGRES_DB: tms_japfa
      POSTGRES_USER: japfa_user
      # 🌟 FIX CTO: Biar makin aman, password DB juga mending tarik dari .env nanti!
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-japfa_password_change_me} 
      TZ: 'Asia/Jakarta'
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U japfa_user -d tms_japfa"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tms-network

  # ==========================================
  # BACKEND - FastAPI (Port 8000)
  # ==========================================
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: tms-japfa-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # 🌟 Database Configuration
      DATABASE_URL: postgresql://japfa_user:${POSTGRES_PASSWORD:-japfa_password_change_me}@postgres:5432/tms_japfa
      
      # 🌟 FIX CTO POINT 1: JWT & Security ditarik dari Host OS / .env file!
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 120 # Ngikutin yang tadi kita ganti 2 jam
      
      # 🌟 Application
      APP_NAME: "TMS JAPFA - AI Engine"
      APP_VERSION: "2.0.0"
      APP_DESCRIPTION: "Transport Management System dengan CVRPTW Optimization"
      DEBUG: "false"
      
      # 🌟 API Keys
      TOMTOM_API_KEY: ${TOMTOM_API_KEY:-your-tomtom-api-key-here}
      
      # 🌟 VRP Configuration
      depo_lat: ${depo_lat}
      depo_lon: ${depo_lon}
      vrp_start_time: "07:00"
      vrp_end_time: "17:00"
      vrp_base_drop_time_mins: 15
      vrp_var_drop_time_mins: 1
      vrp_capacity_buffer_percent: 90
      
      # 🌟 File Upload
      UPLOAD_DIR: uploads
      EPOD_DIR: uploads/epod
      GEOMETRY_DIR: route_geometries
      
      # 🌟 Cost Configuration
      cost_fuel_per_liter: 12500.0
      cost_avg_km_per_liter: 5.0
      cost_driver_salary: 4500000.0
      cost_overtime_rate: 25000.0
      
      PYTHONUNBUFFERED: 1
    ports:
      - "8000:8000"
    volumes:
      - ./Backend:/app
      - ./Backend/uploads:/app/uploads
      - ./Backend/route_geometries:/app/route_geometries
    
    # 🌟 FIX CTO POINT 1: Hapus --reload buat Production. 
    # (Opsional) Kalo mau makin ngebut di server, ntar lu tambahin: --workers 4
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - tms-network
    restart: unless-stopped

  # ==========================================
  # FRONTEND - React + Vite (Port 5173)
  # ==========================================
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      target: builder
    container_name: tms-japfa-web
    environment:
      VITE_API_URL: "http://localhost:8000"
      NODE_ENV: "production" # 🌟 Sekalian dibikin production mode
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - tms-network
    restart: unless-stopped

  # ==========================================
  # NGINX - Reverse Proxy
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: tms-japfa-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./Frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - frontend
    networks:
      - tms-network
    restart: unless-stopped
    profiles: ["production"]

# ==========================================
# NETWORKS & VOLUMES
# ==========================================
networks:
  tms-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local