# Root-level Nginx configuration for reverse proxy
# Used by docker-compose for production-like setup
# Maps requests to backend API and frontend

upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:5173;
}

server {
    listen 80;
    server_name localhost;

    # ==========================================
    # FRONTEND - Serve static files & SPA
    # ==========================================
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ==========================================
    # BACKEND API - Reverse proxy
    # ==========================================
    location /api {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Batas ukuran upload — konsisten dengan backend (10 MB)
        client_max_body_size 10M;
        
        # CORS headers (Backend handles via FastAPI CORS middleware)
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        
        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # ==========================================
    # STATIC ASSETS
    # ==========================================
    location /static {
        proxy_pass http://backend/static;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /uploads {
        proxy_pass http://backend/uploads;
        expires 7d;
    }

    # ==========================================
    # API DOCS (Swagger)
    # ==========================================
    location /docs {
        proxy_pass http://backend/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://backend/openapi.json;
    }

    # ==========================================
    # HEALTH CHECKS
    # ==========================================
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location /backend/health {
        proxy_pass http://backend/health;
        access_log off;
    }

    # ==========================================
    # GZIP COMPRESSION
    # ==========================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/javascript application/json;
}