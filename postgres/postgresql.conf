# ============================================================
# TMS JAPFA — postgresql.conf custom
# [MR-14] PostgreSQL 16 tuning untuk pilot project (1 server)
#
# CARA APPLY:
#   docker-compose restart postgres
#   (atau) di dalam container: SELECT pg_reload_conf();
# ============================================================

# ----------------------------------------------------------
# CONNECTIONS
# ----------------------------------------------------------
max_connections = 100          # default 100, cukup untuk pool_size=10 + max_overflow=20 per worker

# ----------------------------------------------------------
# MEMORY (sesuaikan dengan RAM server)
# Asumsi: 4 GB RAM server pilot → sisakan 1 GB untuk OS & backend
# ----------------------------------------------------------
shared_buffers = 1GB           # ~25% dari total RAM
effective_cache_size = 3GB     # ~75% dari total RAM (hint untuk query planner)
work_mem = 16MB                # per sort/hash operation; hati-hati kalau query kompleks
maintenance_work_mem = 256MB   # untuk VACUUM, CREATE INDEX, ALTER TABLE

# ----------------------------------------------------------
# WRITE AHEAD LOG (WAL)
# ----------------------------------------------------------
wal_buffers = 16MB
checkpoint_completion_target = 0.9
min_wal_size = 1GB
max_wal_size = 4GB

# ----------------------------------------------------------
# QUERY PLANNER
# ----------------------------------------------------------
default_statistics_target = 100   # default 100, bisa naik ke 500 kalau planner sering salah
random_page_cost = 1.1            # SSD → turunkan dari 4.0 ke 1.1

# ----------------------------------------------------------
# [MR-14] MONITORING: Log query yang lambat (> 1 detik)
# Ini yang diminta: log_min_duration_statement
# File log ada di: docker logs tms-japfa-db
# ----------------------------------------------------------
log_min_duration_statement = 1000     # milliseconds; query > 1 detik akan di-log
log_line_prefix = '%t [%p]: [%l-1] db=%d,user=%u,app=%a,client=%h '
log_checkpoints = on
log_connections = off                  # off biar tidak banjir log saat pool reconnect
log_disconnections = off
log_lock_waits = on                    # log kalau ada query nunggu lock > deadlock_timeout
deadlock_timeout = 1s

# ----------------------------------------------------------
# AUTOVACUUM — jaga table bloat
# ----------------------------------------------------------
autovacuum = on
autovacuum_vacuum_cost_delay = 2ms    # PG16 default; lebih agresif dari PG12 (20ms)

# ----------------------------------------------------------
# TIMEZONE
# ----------------------------------------------------------
timezone = 'Asia/Jakarta'
log_timezone = 'Asia/Jakarta'

# ----------------------------------------------------------
# CLIENT
# ----------------------------------------------------------
datestyle = 'iso, mdy'
lc_messages = 'en_US.utf8'